<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licznik</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 25px;
            font-weight: normal;
        }

        #timer {
            font-size: 3rem;
            font-weight: bold;
            color: #4CAF50;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Od poprzedniego złamania konstytucji przez rząd minęło:</h1>
    <div id="timer">0 dni 00:00:00</div>
</div>

<script>
    // ← Tutaj wstaw swój timestamp (w milisekundach)
    const START_TIMESTAMP = 1784498401000;

    function updateTimer() {
    const now = Date.now();
    const diff = now - START_TIMESTAMP;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
    const minutes = Math.floor(diff / (1000 * 60)) % 60;
    const seconds = Math.floor(diff / 1000) % 60;

    document.getElementById("timer").textContent =
        `${days} dni ${hours} godzin ${minutes} minut ${seconds} sekund`;
}

updateTimer();
setInterval(updateTimer, 1000);
</script>

</body>
</html>
